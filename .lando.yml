# =============================================================================
# Next PMS Development Environment — Lando Configuration
# =============================================================================
# Generated by the lando-frappe-erpnext skill.
#
# Architecture:
#   Browser → [Lando Proxy/Traefik] → [frappe:8000/Werkzeug]
#   frappe → [MariaDB] + [Redis Cache] + [Redis Queue]
#   Background: [scheduler] → [redis-queue] → [workers]
#   Real-time:  [websocket/Socket.IO] ↔ [redis-cache]
#
# Directory layout:
#   .  (project root)  → Mounted as custom app next_pms into bench
#   .data/frappe-bench → Bench internals: env, sites, framework apps (gitignored)
# =============================================================================

name: next-pms

proxy:
  frappe:
    - next-pms.lndo.site:8000
    - next-pms-frontend.lndo.site:5173
  mailpit:
    - mail.next-pms.lndo.site:8025

services:

  # --- Frappe Bench (Primary Development Container) ---
  frappe:
    api: 3
    type: lando
    ssl: true
    sslExpose: false
    app_mount: false
    meUser: frappe
    services:
      image: frappe/bench:latest
      command: >-
        bash -c "
        BENCH_DIR=/workspace/development/frappe-bench;
        while [ ! -f \"$$BENCH_DIR/.setup-complete\" ]; do
          echo 'Waiting for bench setup to complete...';
          sleep 5;
        done;
        if [ -f \"$$BENCH_DIR/.frontend-gateway.py\" ]; then
          python3 \"$$BENCH_DIR/.frontend-gateway.py\" &
          echo 'Frontend gateway running on :5173 (proxies to Vite on :5175)';
        fi;
        cd $$BENCH_DIR && bench start"
      working_dir: /workspace/development
      ports:
        - "8000"
        - "9000"
        - "6787"
        - "5173"
        - "5175"
      environment:
        # CRITICAL: Lando remaps UID 1000 to www-data with HOME=/var/www.
        # The bench CLI is installed under /home/frappe/.local via PEP 660
        # editable install. Without this override, Python cannot resolve
        # the bench module.
        HOME: /home/frappe
        SHELL: /bin/bash
        PYENV_ROOT: /home/frappe/.pyenv
        PATH: /home/frappe/.nvm/versions/node/v24.13.0/bin:/home/frappe/.local/bin:/home/frappe/.pyenv/shims:/home/frappe/.pyenv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        BENCH_DEVELOPER: "1"
      volumes:
        - ./.data/frappe-bench:/workspace/development
        - .:/workspace/apps/next_pms
      depends_on:
        - mariadb
        - redis-cache
        - redis-queue
    run_as_root:
      # Bind-mounted directories start as root-owned. Fix permissions so
      # the frappe user (UID 1000) can write to the workspace.
      - chown 1000:1000 /workspace/development
      - chown 1000:1000 /workspace/apps/next_pms
    run:
      - |
        set -e
        BENCH_DIR=/workspace/development/frappe-bench

        # --- Wait for MariaDB readiness ---
        echo "==> Waiting for MariaDB..."
        for i in $(seq 1 30); do
          if mariadb -h mariadb -u root -p123 -e "SELECT 1" > /dev/null 2>&1; then
            echo "    MariaDB is ready."
            break
          fi
          if [ "$i" = "30" ]; then
            echo "ERROR: MariaDB did not become ready in time."
            exit 1
          fi
          sleep 2
        done

        # --- Initialize bench if not present ---
        if [ ! -d "$BENCH_DIR" ]; then
          echo "==> Initializing Frappe Bench..."
          cd /workspace/development
          bench init \
            --skip-redis-config-generation \
            --frappe-branch version-15 \
            frappe-bench
          cd "$BENCH_DIR"

          echo "==> Configuring service hosts..."
          bench set-config -g db_host mariadb
          bench set-config -g redis_cache redis://redis-cache:6379
          bench set-config -g redis_queue redis://redis-queue:6379
          bench set-config -g redis_socketio redis://redis-cache:6379
          bench set-config -gp developer_mode 1

          # --- Get core apps from git ---
          echo "==> Getting ERPNext..."
          bench get-app --branch version-15 erpnext

          echo "==> Getting HRMS..."
          bench get-app --branch version-15 hrms
        else
          echo "==> Frappe Bench already initialized."
        fi

        cd "$BENCH_DIR"

        # --- Soft-link custom apps from /workspace/apps into bench ---
        # Apps mounted via volume are soft-linked into the bench's apps/
        # directory and pip-installed in editable mode. This keeps app
        # source code on the host for version control and IDE access.
        if [ -d /workspace/apps ]; then
          for app_dir in /workspace/apps/*/; do
            [ -d "$app_dir" ] || continue
            app_name=$(basename "$app_dir")
            if [ ! -e "$BENCH_DIR/apps/$app_name" ]; then
              echo "==> Linking custom app: $app_name"
              ln -s "/workspace/apps/$app_name" "$BENCH_DIR/apps/$app_name"
              # Editable pip install so Python can import the app
              $BENCH_DIR/env/bin/pip install -e "/workspace/apps/$app_name"
              # Register app in apps.txt so bench recognizes it.
              # Ensure trailing newline exists before appending to avoid
              # concatenation with the previous entry (e.g., "hrmsnext_pms").
              if ! grep -q "^$app_name$" "$BENCH_DIR/sites/apps.txt" 2>/dev/null; then
                [ -s "$BENCH_DIR/sites/apps.txt" ] && [ -n "$(tail -c 1 "$BENCH_DIR/sites/apps.txt")" ] && echo >> "$BENCH_DIR/sites/apps.txt"
                echo "$app_name" >> "$BENCH_DIR/sites/apps.txt"
              fi
            fi
          done
        fi

        # --- Create site if needed (with stale directory detection) ---
        if [ ! -d "$BENCH_DIR/sites/development.localhost" ]; then
          NEED_SITE=1
        elif ! mariadb -h mariadb -u root -p123 -e "USE $(python3 -c "import json; print(json.load(open('$BENCH_DIR/sites/development.localhost/site_config.json'))['db_name'])")" > /dev/null 2>&1; then
          echo "==> Site directory exists but database is missing. Recreating..."
          rm -rf "$BENCH_DIR/sites/development.localhost"
          NEED_SITE=1
        fi

        if [ "${NEED_SITE:-}" = "1" ]; then
          echo "==> Creating site..."
          bench new-site \
            --db-root-password 123 \
            --admin-password admin \
            --mariadb-user-host-login-scope='%' \
            --set-default \
            development.localhost

          # --- Install core apps on site ---
          echo "==> Installing core apps on site..."
          bench --site development.localhost install-app erpnext
          bench --site development.localhost install-app hrms

          # --- Install custom apps (soft-linked from /workspace/apps) ---
          if [ -d /workspace/apps ]; then
            for app_dir in /workspace/apps/*/; do
              [ -d "$app_dir" ] || continue
              app_name=$(basename "$app_dir")
              echo "==> Installing custom app on site: $app_name"
              bench --site development.localhost install-app "$app_name"
            done
          fi

          echo "==> Site setup complete!"
        fi

        # --- Custom frontend setup ---
        APP_FRONTEND="/workspace/apps/next_pms/frontend"
        if [ -d "$APP_FRONTEND" ] && [ -f "$APP_FRONTEND/package.json" ]; then
          # Generate .env for Lando if .env.sample exists but .env doesn't
          if [ -f "$APP_FRONTEND/.env.sample" ] && [ ! -f "$APP_FRONTEND/.env" ]; then
            echo "==> Configuring frontend environment..."
            printf '%s\n' \
              "VITE_BASE_URL=https://next-pms.lndo.site" \
              "VITE_SOCKET_PORT=5173" \
              "VITE_SITE_NAME=localhost" \
              "VITE_ENABLE_SOCKET=true" \
              "VITE_SITE_PORT=8000" \
              > "$APP_FRONTEND/.env"
          fi

          # Use bench build instead of npm run build directly.
          # bench build creates the asset symlink in sites/assets/<app>/
          # that Frappe needs to serve static files. Running npm run build
          # alone builds the files but Frappe can't find them (404s).
          echo "==> Building frontend assets via bench..."
          bench build --app next_pms
        fi

        # --- Configure Mailpit SMTP so Frappe sends mail through it ---
        bench set-config -g mail_server mailpit
        bench set-config -gp mail_port 1025
        bench set-config -gp disable_mail 0

        # CRITICAL: Clear stale Redis caches so the web process picks up
        # the full module-to-app mapping. Without this, the setup wizard
        # may fail with "Module <X> not found".
        bench --site development.localhost clear-cache

        # --- Write frontend gateway script ---
        # A reverse proxy on port 5173 that auto-detects Vite on port 5175.
        # When Vite is not running, serves a placeholder page.
        # When Vite is running, proxies all requests to it.
        # No kill/restart needed — lando frontend-dev just starts Vite on 5175.
        printf '%s\n' \
          'import http.server, socketserver, urllib.request, urllib.error' \
          'VITE_PORT = 5175' \
          'PLACEHOLDER = b"""<!doctype html>' \
          '<html><head><title>Next PMS - Frontend</title>' \
          '<meta http-equiv="refresh" content="3"></head>' \
          '<body style="font-family:system-ui,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:#f5f5f5;color:#333">' \
          '<div style="text-align:center;max-width:500px;padding:2rem">' \
          '<h2 style="margin-bottom:0.5rem">Frontend Dev Server Not Running</h2>' \
          '<p style="color:#666">Run <code style="background:#e5e5e5;padding:2px 8px;border-radius:4px">lando frontend-dev</code> in a separate terminal.</p>' \
          '<p style="color:#999;font-size:0.85rem">This page will auto-refresh when Vite starts.</p>' \
          '</div></body></html>"""' \
          'class Handler(http.server.BaseHTTPRequestHandler):' \
          '    def do_GET(self):' \
          '        try:' \
          '            url = f"http://localhost:{VITE_PORT}{self.path}"' \
          '            req = urllib.request.Request(url)' \
          '            for h in self.headers:' \
          '                if h.lower() not in ("host",):' \
          '                    req.add_header(h, self.headers[h])' \
          '            resp = urllib.request.urlopen(req, timeout=2)' \
          '            self.send_response(resp.status)' \
          '            for h, v in resp.getheaders():' \
          '                if h.lower() not in ("transfer-encoding",):' \
          '                    self.send_header(h, v)' \
          '            self.end_headers()' \
          '            self.wfile.write(resp.read())' \
          '        except (urllib.error.URLError, OSError):' \
          '            self.send_response(200)' \
          '            self.send_header("Content-Type", "text/html")' \
          '            self.end_headers()' \
          '            self.wfile.write(PLACEHOLDER)' \
          '    do_POST = do_GET' \
          '    def log_message(self, *args):' \
          '        pass' \
          'socketserver.TCPServer.allow_reuse_address = True' \
          'socketserver.TCPServer(("0.0.0.0", 5173), Handler).serve_forever()' \
          > "$BENCH_DIR/.frontend-gateway.py"

        # Signal to the command loop that setup is done
        touch "$BENCH_DIR/.setup-complete"
        echo "==> Setup complete. Bench will start automatically."

  # --- MariaDB ---
  mariadb:
    api: 3
    type: lando
    app_mount: false
    services:
      image: mariadb:10.6
      # CRITICAL: Must invoke docker-entrypoint.sh explicitly.
      # Lando replaces Docker entrypoints — without this, the shell
      # tries to execute the flags as a command.
      command: docker-entrypoint.sh mariadbd --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --skip-character-set-client-handshake --skip-innodb-read-only-compressed
      ports:
        - "3306"
      environment:
        MYSQL_ROOT_PASSWORD: "123"
        MYSQL_DATABASE: "_placeholder"
        MARIADB_AUTO_UPGRADE: "1"

  # --- Redis Cache ---
  redis-cache:
    api: 3
    type: lando
    app_mount: false
    services:
      image: docker.io/redis:alpine
      command: docker-entrypoint.sh redis-server
      ports:
        - "6379"

  # --- Redis Queue ---
  redis-queue:
    api: 3
    type: lando
    app_mount: false
    services:
      image: docker.io/redis:alpine
      command: docker-entrypoint.sh redis-server
      ports:
        - "6379"

  # --- Mailpit (Dev Mail Server) ---
  mailpit:
    api: 3
    type: lando
    ssl: true
    sslExpose: false
    app_mount: false
    services:
      image: axllent/mailpit
      command: /mailpit
      ports:
        - "8025"
        - "1025"
      environment:
        MP_MAX_MESSAGES: 5000
        # CRITICAL: Use MP_DATABASE, not MP_DATA_FILE (deprecated).
        # Use /tmp to avoid missing directory errors.
        MP_DATABASE: /tmp/mailpit.db
        MP_SMTP_AUTH_ACCEPT_ANY: 1
        MP_SMTP_AUTH_ALLOW_INSECURE: 1

tooling:
  bench:
    service: frappe
    description: "Run any bench command"
    dir: /workspace/development/frappe-bench
    cmd: bench
  bench-start:
    service: frappe
    description: "Start Frappe dev server manually"
    dir: /workspace/development/frappe-bench
    cmd: bench start
  migrate:
    service: frappe
    description: "Run database migrations"
    dir: /workspace/development/frappe-bench
    cmd: bench migrate
  build:
    service: frappe
    description: "Build Frappe frontend assets"
    dir: /workspace/development/frappe-bench
    cmd: bench build
  console:
    service: frappe
    description: "Open Frappe Python console"
    dir: /workspace/development/frappe-bench
    cmd: bench console
  new-app:
    service: frappe
    description: "Create a new Frappe app"
    dir: /workspace/development/frappe-bench
    cmd: bench new-app
  install-app:
    service: frappe
    description: "Install a Frappe app on the site"
    dir: /workspace/development/frappe-bench
    cmd: bench install-app
  get-app:
    service: frappe
    description: "Download a Frappe app from git"
    dir: /workspace/development/frappe-bench
    cmd: bench get-app
  add-user:
    service: frappe
    description: "Add a user to the Frappe site"
    dir: /workspace/development/frappe-bench
    cmd: bench add-user
  mariadb-cli:
    service: frappe
    description: "Open MariaDB console via bench"
    dir: /workspace/development/frappe-bench
    cmd: bench mariadb
  backup:
    service: frappe
    description: "Backup the current site"
    dir: /workspace/development/frappe-bench
    cmd: bench backup
  clear-cache:
    service: frappe
    description: "Clear Redis cache"
    dir: /workspace/development/frappe-bench
    cmd: bench clear-cache
  python:
    service: frappe
    description: "Run Python in the bench environment"
    dir: /workspace/development/frappe-bench
    cmd: python3
  node:
    service: frappe
    description: "Run Node.js"
    cmd: node
  yarn:
    service: frappe
    description: "Run yarn"
    dir: /workspace/development/frappe-bench
    cmd: yarn
  redis-cli:
    service: redis-cache
    description: "Open Redis CLI (cache instance)"
    cmd: redis-cli
  mysql:
    service: mariadb
    description: "Open MariaDB shell directly"
    cmd: mariadb -u root -p123
  frontend-dev:
    service: frappe
    description: "Start frontend dev server (Vite)"
    dir: /workspace/apps/next_pms/frontend
    cmd: npm run dev -w @next-pms/app -- --host 0.0.0.0 --port 5175
  frontend-install:
    service: frappe
    description: "Install frontend dependencies"
    dir: /workspace/apps/next_pms/frontend
    cmd: npm install
  frontend-build:
    service: frappe
    description: "Build frontend for production"
    dir: /workspace/apps/next_pms/frontend
    cmd: npm run build
  frontend-lint:
    service: frappe
    description: "Lint frontend code"
    dir: /workspace/apps/next_pms/frontend
    cmd: npm run lint

events:
  post-start:
    - frappe: echo "======================================================="
    - frappe: echo " Next PMS Development Environment Ready"
    - frappe: echo " Site URL    → https://next-pms.lndo.site"
    - frappe: echo " Frontend    → https://next-pms-frontend.lndo.site"
    - frappe: echo "               (run 'lando frontend-dev' to start)"
    - frappe: echo " Mailpit     → https://mail.next-pms.lndo.site"
    - frappe: echo " Admin       → Administrator / admin"
    - frappe: echo "======================================================="
